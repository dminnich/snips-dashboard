services:
  dashboard:
    build:
      context: .
      target: runtime
    image: snips-dashboard:latest
    container_name: snips-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATA_DIR=/data
    volumes:
      - ./data:/data:z
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/data', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  dev:
    build:
      context: .
      target: dev
    image: snips-dashboard:dev
    container_name: snips-dashboard-dev
    profiles: ["dev"]
    ports:
      - "5173:5173"
    environment:
      - DATA_DIR=/data
    volumes:
      - ./data:/data:z
      - ./src:/app/src:z
      - ./server.cjs:/app/server.cjs:z
      - ./vite.config.ts:/app/vite.config.ts:z
      - ./tsconfig.app.json:/app/tsconfig.app.json:z
      - ./tsconfig.json:/app/tsconfig.json:z
      - ./tsconfig.node.json:/app/tsconfig.node.json:z
      - ./eslint.config.js:/app/eslint.config.js:z
      - ./index.html:/app/index.html:z

  test:
    build:
      context: .
      target: test
    image: snips-dashboard:test
    container_name: snips-dashboard-test
    profiles: ["test"]
    command: ["sh", "-c", "npm test && npm run lint && npm run typecheck && npm run format:check"]
